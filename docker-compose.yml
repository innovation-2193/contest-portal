services:
  mysql:
    image: mysql:8.4
    container_name: police-innovation-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: police_innovation
      MYSQL_USER: contest
      MYSQL_PASSWORD: contest_password
      MYSQL_ROOT_PASSWORD: local_root_password
      TZ: Asia/Bangkok
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucontest", "-pcontest_password"]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  mysql-data:
